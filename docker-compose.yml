version: '3.8'

# ==============================================================================
# 🛡️ SEGREGACIÓN HERMÉTICA DE CAPAS DE RED (Zero-Trust Cryptographic Grid)
# ==============================================================================
networks:
  ingress_net:
    driver: bridge
    internal: false # Única compuerta con salida al perímetro de comunicaciones e Internet
    driver_opts:
      com.docker.network.bridge.name: "br_ingress"
  backend_net:
    driver: bridge
    internal: true # Aislamiento electromagnético virtual total. Cero accesos públicos.
    driver_opts:
      com.docker.network.bridge.name: "br_backend"

services:
  # ==============================================================================
  # 🗄️ MOTOR RELACIONAL INDEXADO: POSTGRESQL (Grado Bancario / ACID Compliant)
  # ==============================================================================
  db:
    image: postgres:14-alpine
    container_name: db
    networks:
      - backend_net
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL # Suprime todas las capacidades del Kernel para evitar escaladas de root
    tmpfs:
      - /tmp # Redirecciona búferes temporales volátiles directos a la RAM física
      - /run/postgresql
    volumes:
      - postgres_data:/var/lib/postgresql/data:rw
    environment:
      - POSTGRES_DB=ceviche_db
      - POSTGRES_USER=ceviche_admin
      - POSTGRES_PASSWORD=super_secreto_db_123
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ceviche_admin -d ceviche_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ==============================================================================
  # 🏎️ CAPA DE CACHÉ IN-MEMORY O(1): REDIS (Cónclave Core Inmutable)
  # ==============================================================================
  redis:
    image: redis:7-alpine
    container_name: redis
    networks:
      - backend_net
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp
      - /data:size=100M # Evita la persistencia forense en disco magnético
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
        reservations:
          cpus: '0.10'
          memory: 128M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ==============================================================================
  # 🌐 NÚCLEO RUNTIME ASÍNCRONO (ASGI): DJANGO PLATFORM CORE
  # ==============================================================================
  web:
    build: .
    container_name: web
    init: true # 🧠 PID 1 Nativo: Inmola subprocesos huérfanos y previene Memory Leaks
    read_only: true # 🔒 File System de Solo Lectura Absoluto (Inmunidad a Malware)
    networks:
      - ingress_net
      - backend_net
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    entrypoint: ["/bin/bash", "/app/entrypoint.sh"]
    tmpfs:
      - /tmp:size=64M
    volumes:
      - ./entrypoint.sh:/app/entrypoint.sh:ro
      - static_volume:/app/staticfiles:rw
      - media_volume:/app/media:rw
      # 🛡️ BÓVEDA ELÍPTICA: Inyección blindada de llaves criptográficas ECDSA
      - ./ecdsa_private.pem:/app/ecdsa_private.pem:ro
      - ./ecdsa_public.pem:/app/ecdsa_public.pem:ro
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgres://ceviche_admin:super_secreto_db_123@db:5432/ceviche_db
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - DJANGO_SETTINGS_MODULE=config.settings
      - PORT=8000
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 1.5G
        reservations:
          cpus: '0.5'
          memory: 512M
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ==============================================================================
  # 🤖 DISTRIBUTED PIPELINE WORKER: CELERY LOGISTICS ASYNC ENGINE
  # ==============================================================================
  celery_worker:
    build: .
    container_name: celery_worker
    init: true
    read_only: true
    networks:
      - ingress_net # 🔥 RECTIFICADO: Permite salida perimetral segura para conectar con Google SMTP
      - backend_net # Sincronización interna con el clúster de datos
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    command: celery -A config worker --loglevel=info --queues=financial_deliveries
    tmpfs:
      - /tmp:size=128M # Compilación de PDFs vectoriales ReportLab aislada en memoria RAM volátil
    volumes:
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:rw
      - ./ecdsa_private.pem:/app/ecdsa_private.pem:ro
      - ./ecdsa_public.pem:/app/ecdsa_public.pem:ro
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgres://ceviche_admin:super_secreto_db_123@db:5432/ceviche_db # 🔥 CORREGIDO: Mapeo exacto a ceviche_db
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - DJANGO_SETTINGS_MODULE=config.settings
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ==============================================================================
  # ⏱️ RELOJ ATÓMICO CENTRAL: CELERY BEAT (El Segador de Inventario Autónomo)
  # ==============================================================================
  celery_beat:
    build: .
    container_name: celery_beat
    init: true
    read_only: true
    networks:
      - backend_net
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    command: celery -A config beat --loglevel=info
    tmpfs:
      - /tmp:size=16M
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgres://ceviche_admin:super_secreto_db_123@db:5432/ceviche_db # 🔥 CORREGIDO: Mapeo exacto a ceviche_db
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - DJANGO_SETTINGS_MODULE=config.settings
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ==============================================================================
  # 🛡️ REVERSE PROXY, SSL TERMINATION & EDGE FIREWALL: NGINX (Anti-DDoS Shield)
  # ==============================================================================
  nginx:
    image: nginx:alpine
    container_name: nginx
    read_only: true
    networks:
      - ingress_net
    ports:
      - "80:80"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE # Restringe los permisos del contenedor únicamente al binding del puerto perimetral
    tmpfs:
      - /var/cache/nginx:size=32M
      - /var/run:size=4M
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    depends_on:
      - web
    restart: unless-stopped

# ==============================================================================
# 💾 MATRIZ INMUTABLE DE VOLÚMENES PERSISTENTES
# ==============================================================================
volumes:
  postgres_data:
  static_volume:
  media_volume: