# ==============================================================================
# 🛡️ PERÍMETRO INMUTABLE - CEVICHE OS v3.0 (GOD-TIER BANKING EDITION)
# Arquitectura: Zero-Trust | Protección Anti-DoS | Handshake ASGI O(1)
# ==============================================================================

upstream django_backend {
    server web:8000;
    keepalive 32; # Mantiene sockets abiertos con el backend, reduciendo latencia TCP O(1)
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _; 

    # 🛑 OFUSCACIÓN ABSOLUTA (Anti-Fingerprinting / Reverse Engineering)
    server_tokens off; # Desactiva la versión de Nginx en respuestas y páginas de error

    # 🛡️ HARDENING DE BÚFERES (Mitigación de Memory Dumping & Buffer Overflow DDoS)
    client_body_buffer_size      128k;
    client_max_body_size         10M; # Límite estricto para payloads de MercadoPago/Media
    client_header_buffer_size    1k;
    large_client_header_buffers  4 4k;
    
    # ⏱️ TIMEOUTS AGRESIVOS (Mitigación de Slowloris y Hilos Zombis)
    client_body_timeout          12s;
    client_header_timeout        12s;
    keepalive_timeout            15s;
    send_timeout                 10s;

    # 🔒 CABECERAS DEFENSIVAS CORE (Grado Bancario OWASP / PCI-DSS Compliant)
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline'" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # 📂 CAPA ESTÁTICA OPTIMIZADA: WHITENOISE EDGE BYPASS (Complejidad O(1))
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        access_log off;
        log_not_found off;
        add_header Cache-Control "public, max-age=2592000, no-transform";
        add_header X-Content-Type-Options "nosniff" always;
    }

    location /media/ {
        alias /app/media/;
        expires 30d;
        access_log off;
        log_not_found off;
        add_header Cache-Control "public, max-age=2592000, no-transform";
        add_header X-Content-Type-Options "nosniff" always;
    }

    # 🌐 TUNELAMIENTO HÍBRIDO ASÍNCRONO: HTTP + WEBSOCKETS (ASGI Core)
    location / {
        proxy_pass http://django_backend;
        
        # 🏎️ Optimización de Protocolo HTTP
        proxy_http_version 1.1;
        proxy_set_header Connection ""; # Permite mantener conexiones activas via HTTP/1.1
        
        # 🛡️ Inyección de Cabeceras de Identidad de Red Inmutables
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 🚀 INTERRUPTOR DE ELEVACIÓN ASÍNCRONA (WebSocket Upgrade Handshake)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # ⏱️ Timeouts de Red de Alta Disponibilidad
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    86400s; # Mantiene vivas las conexiones WebSocket de telemetría por 24h

        # 🧠 Búferes de Proxy de Red (Protección contra inyecciones pesadas en RAM)
        proxy_buffering off;
        proxy_buffer_size 4k;
        proxy_buffers 4 4k;
    }

    # ❌ DENEGACIÓN PROACTIVA DE ARCHIVOS OCULTOS (Anti-Reconnaissance)
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}